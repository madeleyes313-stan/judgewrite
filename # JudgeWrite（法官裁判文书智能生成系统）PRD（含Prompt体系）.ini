# 五、后端接口设计

---

## 5.1 上传卷宗

POST /api/upload

输入：

* files

输出：

```
{
  "case_id": "xxx",
  "parsed_text": "..."
}
```

---

## 5.2 要素抽取

POST /api/extract

输出：

```
structured_json
```

---

## 5.3 文书生成

POST /api/generate

流程：

```
parse → reasoning → style → enhance → validate
```

输出：

```
{
  "draft": "...",
  "issues": [...]
}
```

