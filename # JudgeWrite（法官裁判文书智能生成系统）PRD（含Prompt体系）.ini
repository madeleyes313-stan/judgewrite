# JudgeWrite（法官裁判文书智能生成系统）PRD（含Prompt体系）

---

# 一、产品概述

## 1.1 产品目标

构建一套面向法院法官的智能裁判文书生成系统，实现：

* 一键上传卷宗 → 自动生成裁判文书
* 保留法官个人写作风格（非模板化）
* 输出法律严谨、结构规范、可解释的文书
* 显著降低文书撰写时间（目标 ≥50%）

---

## 1.2 核心能力

1. 案件材料结构化解析
2. 基于RAG的相似案件检索
3. 裁判逻辑生成（无风格）
4. 法官风格建模 + 风格重写
5. 文书合规校验

---

## 1.3 核心原则（必须贯彻）

* 不生成不存在的事实或证据
* 所有结论可追溯来源
* 输出结构完全可控
* 避免“AI味”（模板化表达）

---

# 二、整体系统架构

```
前端（React）
   ↓
API网关（FastAPI）
   ↓
--------------------------------
1. 案件解析服务
2. 要素抽取服务
3. RAG检索服务
4. 文书生成服务（LLM）
5. 风格建模服务
6. 校验服务
--------------------------------
   ↓
数据层：
- 文书库（结构化）
- 向量库（Milvus/FAISS）
- 风格库（Style Profile）
```

---

# 三、核心流程

```
1. 上传卷宗
2. OCR + 文档分类
3. 案件要素抽取
4. 相似案件检索（RAG）
5. 裁判逻辑生成（无风格）
6. 风格重写（个性化）
7. 引用增强
8. 合规校验
9. 输出文书
```

---

# 四、Prompt体系（核心模块）

⚠️ 所有LLM调用必须严格使用以下Prompt，不允许自由发挥

---

## 4.1 全局System Prompt（所有任务必须带）

```
你是一个“法院裁判文书生成系统”，而不是聊天助手。

你的目标：
1. 输出必须符合法院裁判文书规范
2. 不得出现AI风格语言
3. 不得编造事实或证据
4. 所有结论必须基于输入材料
5. 输出必须严格遵守指定结构

禁止行为：
- 不得生成未提供的证据
- 不得创造不存在的法律条文
- 不得输出解释性内容

输出要求：
- 仅输出结果
- 使用正式法律语言
- 保持逻辑严密
```

---

## 4.2 案件解析 Prompt（阶段1）

### 输入

* 原始卷宗文本

### 输出

* 标准JSON

### Prompt

```
任务：从案件材料中提取结构化信息

要求：
1. 仅基于提供内容
2. 不得推测
3. 输出必须为JSON

输出格式：

{
  "案件类型": "",
  "当事人": [],
  "诉讼请求": "",
  "事实陈述": "",
  "证据": [],
  "争议焦点": [],
  "法条候选": []
}

案件材料：
{{case_text}}
```

---

## 4.3 裁判逻辑生成 Prompt（阶段2）

### 目标

生成“法院认为”（无风格）

### Prompt

```
任务：生成裁判逻辑

要求：
1. 不加入风格
2. 必须围绕争议焦点分析
3. 每个结论必须有依据

输出结构：

法院认为：
1. 关于【争议焦点1】，……
2. 关于【争议焦点2】，……

输入：
{{structured_json}}
```

---

## 4.4 风格重写 Prompt（阶段3）

⚠️ 核心模块

### 输入

* 标准文书
* 风格画像
* 历史文书

### Prompt

```
任务：改写为指定法官风格

要求：
1. 不改变法律含义
2. 不增删事实
3. 必须参考历史文书表达
4. 避免重复句式

风格画像：
{{style_profile}}

历史文书：
{{historical_cases}}

原文：
{{legal_text}}

输出：
风格化文书
```

---

## 4.5 引用增强 Prompt（阶段4）

```
任务：优化文书，使其更接近真实人工写作

要求：
1. 引入类似历史表达
2. 保持法律严谨
3. 不直接复制

参考：
{{history_snippets}}

当前文书：
{{draft}}

输出：
优化文书
```

---

## 4.6 校验 Prompt（阶段5）

```
任务：检查文书问题

检查项：
1. 证据是否支持结论
2. 是否遗漏争议焦点
3. 法条是否正确
4. 是否存在逻辑冲突

输出：

{
  "问题列表": [],
  "修改建议": []
}
```

