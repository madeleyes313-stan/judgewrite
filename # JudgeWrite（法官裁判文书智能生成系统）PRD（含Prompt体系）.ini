# 十、验收标准

---

## 功能

* 能生成完整文书
* 支持编辑
* 支持导出

---

## 质量

* 无明显AI痕迹
* 无事实错误
* 法条引用正确

---

## 性能

* 单次生成 < 10秒

---

# 十一、风险与对策

---

## 风险：AI味重

→ 增加历史文书注入

---

## 风险：幻觉

→ 强制JSON + 校验

---

## 风险：风格不稳定

→ Style Profile + few-shot

---

# 十二、结论

本系统的核心不是“生成能力”，而是：

* 风格控制
* 可解释性
* 法律严谨性

