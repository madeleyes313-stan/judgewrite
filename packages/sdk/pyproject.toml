[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "judgewrite-sdk"
version = "0.1.0"
description = "HTTP SDK for JudgeWrite API"
requires-python = ">=3.9"
dependencies = [
  "requests>=2.31,<3"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
